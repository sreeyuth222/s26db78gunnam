<!DOCTYPE html><html><head><title>Register</title><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="/stylesheets/style.css"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script></head><body><div class="container mt-4"><h1>Register</h1><div class="alert alert-warning" role="alert">That username is already registered. Please choose another one.</div><form method="POST" action="/register"><div class="mb-3"><label class="form-label" for="username">Username</label><input class="form-control" id="username" type="text" name="username" required></div><div class="mb-3"><label class="form-label" for="password">Password</label><input class="form-control" id="password" type="password" name="password" required></div><button class="btn btn-primary" type="submit">Register</button></form><p class="mt-3"><a href="/login">Already have an account? Login</a></p></div></body></html>
